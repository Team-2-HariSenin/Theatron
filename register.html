<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatron</title>
    <link rel="icon" href="img/theotron1.jpg" />
    <link rel="stylesheet" href="css-for-header/styleheader.css">
    <link rel="stylesheet" href="css-for-header/responsiveheader.css">
    <link rel="stylesheet" href="css-for-register/styleregister.css">
    <link rel="stylesheet" href="css-for-register/responsiveregister.css">

    <!-- Style -->
    <style>
        
        

    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1 class="logo-header"><a href="#">Theatron</a></h1>
        <div>
            <input class="input-search" id="input-search" type="text" placeholder="Search">
        </div>

        <nav>
            <a href="#">Movies</a>
            <a href="#">Whatchlist</a>
            <a class="signin-btn" href="#">Sign In</a>
        </nav>

        <div class="burger">
            <div class="line-1"></div>
            <div class="line-2"></div>
            <div class="line-3"></div>
        </div>
    </header>
    <!-- end of Header -->

    <!-- Form Register -->
    <main>
        <form class="form-for-register" action="">
            <h1 class="form-title">Create New Account</h1>
            <div class="container-input">
                <div>
                    <label for="name">User Name</label><br>
                    <input class="input-register" type="text" name="name">
                </div>
                <div>
                    <label for="email">Email</label><br>
                    <input class="input-register" type="email" name="email">
                </div>
                <div>
                    <label for="phone">Phone</label><br>
                    <input class="input-register" type="tel" name="phone">
                </div>
                <div>
                    <label for="password">Password</label><br>
                    <input class="input-register" type="password" name="password">
                </div>
                <div>
                    <label for="confirmPassword">Confirm Password</label><br>
                    <input class="input-register" type="password" name="confirmPassword" id="confirmPassword">
                </div>
            </div>
            <div class="form-btn">
                <button class="btn-register">REGISTER</button>
                <div class="space">
                    <div class="small-line"></div>
                    <div class="or">or</div>
                    <div class="small-line"></div>
                </div>
                <a href="#">LOG IN</a>
            </div>
        </form>
    </main>
    <!-- end of Form Register -->

    <!-- Footer -->
    <footer></footer>
    <!-- end of Footer -->

    <!-- custom js -->
    <script src="js-for-header/jsheader.js"></script>
</body>
</html>
